models:
  # --- primary debug target: tiny, Apache 2.0, no gating, seconds-scale loop ---
  gemma-4-E2B-it:
    source: google/gemma-4-E2B-it
    path: models/gemma-4-E2B-it/weights
    format: bf16
    backends: [vllm]
    default_backend: vllm
    downloaded: false
    size_gb: 10
    backend_env: {}
    backend_args: "--max-model-len 8192 --gpu-memory-utilization 0.30"

  # --- "real model" target: NVFP4 quantized for Blackwell, vLLM-ready ---
  gemma-4-31B-it-nvfp4:
    source: nvidia/Gemma-4-31B-IT-NVFP4
    path: models/gemma-4-31B-it-nvfp4/weights
    format: nvfp4
    backends: [vllm]
    default_backend: vllm
    downloaded: false
    size_gb: 32
    backend_env:
      VLLM_NVFP4_GEMM_BACKEND: marlin
    backend_args: "--quantization modelopt --max-model-len 32768 --gpu-memory-utilization 0.55"

  # --- coding specialist: 80B MoE / 3B active, fp8, 256K context ---
  qwen3-coder-next:
    source: Qwen/Qwen3-Coder-Next-FP8
    path: models/qwen3-coder-next/weights
    format: fp8
    backends: [vllm]
    default_backend: vllm
    downloaded: false
    size_gb: 85
    backend_env: {}
    backend_args: "--max-model-len 65536 --gpu-memory-utilization 0.80 --enable-auto-tool-choice --tool-call-parser qwen3_coder"

  # --- lighter coding sibling: 30B-A3B MoE, served via ollama ---
  # Ollama manages the weights itself under ~/.ollama, so the `path` here is
  # only a placeholder marker (the launcher skips the weights check for ollama).
  qwen3-coder-30b:
    source: ollama://qwen3-coder:30b
    path: models/qwen3-coder-30b/weights
    format: gguf
    backends: [ollama]
    default_backend: ollama
    ollama_tag: qwen3-coder:30b
    downloaded: false
    size_gb: 17
    backend_env: {}
    backend_args: ""

  # --- frontier MoE on llama.cpp: 230B total / 10B active, 3-bit dynamic GGUF ---
  # Unsloth's UD-Q3_K_XL is ~101 GB and fits in 128 GB unified memory with
  # headroom for KV cache. The repo contains every quant (~500 GB+), so
  # allow_patterns scopes the download to just the UD-Q3_K_XL subfolder.
  # See unsloth.ai/docs/models/minimax-m25 for the DGX Spark how-to.
  minimax-m2.5-q3kxl:
    source: unsloth/MiniMax-M2.5-GGUF
    path: models/minimax-m2.5-q3kxl/weights
    format: gguf
    backends: [llamacpp]
    default_backend: llamacpp
    allow_patterns: ["UD-Q3_K_XL/*"]
    downloaded: false
    size_gb: 101
    backend_env: {}
    backend_args: "-c 16384 -fa on -ngl 999 --jinja"

  # --- advanced/optional: very large, slow cold-start, validated NIM path ---
  # Kept for the eventual end-to-end NIM validation but not the day-to-day target.
  nemotron-3-super-120b:
    source: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
    nim_image: nvcr.io/nim/nvidia/nemotron-3-super-120b-a12b:latest
    path: models/nemotron-3-super-120b/weights
    format: nvfp4
    backends: [nim, vllm]
    default_backend: nim
    downloaded: false
    size_gb: 75
    backend_env:
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      VLLM_FLASHINFER_ALLREDUCE_BACKEND: trtllm
      VLLM_USE_FLASHINFER_MOE_FP4: "0"
    backend_args: "--max-model-len 32768 --gpu-memory-utilization 0.85"

  # --- image generation: Flux.1 schnell, Apache 2.0, gated (contact info required) ---
  # ComfyUI is the serving backend; open localhost:8188 after `./launcher serve`.
  # Accept the license at https://huggingface.co/black-forest-labs/FLUX.1-schnell
  # before downloading. hf_token must be set in credentials.
  flux1-schnell:
    source: black-forest-labs/FLUX.1-schnell
    path: models/flux1-schnell/weights
    format: safetensors
    backends: [comfyui]
    default_backend: comfyui
    downloaded: false
    size_gb: 34
    backend_env: {}
    backend_args: ""

  # --- image generation: Flux.1 dev, non-commercial, gated, higher quality ---
  # Same backend/client as schnell but designed for 20+ steps.
  # Accept the license at https://huggingface.co/black-forest-labs/FLUX.1-dev
  flux1-dev:
    source: black-forest-labs/FLUX.1-dev
    path: models/flux1-dev/weights
    format: safetensors
    backends: [comfyui]
    default_backend: comfyui
    downloaded: false
    size_gb: 34
    backend_env: {}
    backend_args: ""

  # --- image editing: Flux.1 Kontext dev, reference-image-conditioned ---
  # Unlike schnell/dev, Kontext takes a reference image alongside the text
  # prompt and generates an edited/recomposed result that preserves identity,
  # style, or layout from the reference.
  #
  # Kontext for ComfyUI needs pieces from three HF repos — the transformer
  # (Comfy-Org's fp8 scaled repack, ComfyUI single-file format), the text
  # encoders (comfyanonymous/flux_text_encoders), and the VAE (the BFL
  # Kontext repo's top-level ae.safetensors). extra_sources drops all three
  # into the same weights dir so the ComfyUI bind-mount sees them under one
  # model name. The BFL repo is gated — accept the license at
  # https://huggingface.co/black-forest-labs/FLUX.1-Kontext-dev before
  # downloading. The other two are public.
  #
  # fp8 is chosen deliberately: Blackwell has fp8 tensor cores and BFL's
  # scaled-fp8 is near-fp16 quality. No single-file fp16 Kontext exists.
  flux1-kontext-dev:
    source: Comfy-Org/flux1-kontext-dev_ComfyUI
    path: models/flux1-kontext-dev/weights
    format: safetensors
    backends: [comfyui]
    default_backend: comfyui
    downloaded: false
    size_gb: 18
    allow_patterns: ["split_files/diffusion_models/flux1-dev-kontext_fp8_scaled.safetensors"]
    extra_sources:
      - source: comfyanonymous/flux_text_encoders
        allow_patterns: ["clip_l.safetensors", "t5xxl_fp8_e4m3fn.safetensors"]
      - source: black-forest-labs/FLUX.1-Kontext-dev
        allow_patterns: ["ae.safetensors"]
    backend_env: {}
    backend_args: ""

  # --- text-to-video: Wan 2.1 T2V-14B, Apache 2.0, 14B diffusion transformer ---
  # Top-tier open-source video generation.  The 14B model normally needs
  # 65-80 GB VRAM — fits in the Spark's 128 GB unified memory in bf16 with
  # headroom for intermediate tensors.  Served via a thin FastAPI wrapper
  # around diffusers' WanPipeline.  Expect several minutes per 5s clip at
  # 480p with the default 30 inference steps.
  wan21-t2v-14b:
    source: Wan-AI/Wan2.1-T2V-14B-Diffusers
    path: models/wan21-t2v-14b/weights
    format: bf16
    backends: [wan-video]
    default_backend: wan-video
    downloaded: false
    size_gb: 69
    backend_env: {}
    backend_args: ""

  # --- text-to-video: FastWan 2.2 TI2V-5B, DMD-distilled, 3-step ---
  # DMD-distilled variant of Wan 2.2 from Hao AI Lab — ~20-50x faster than
  # Wan 2.1 at comparable quality.  Text-and-image to video; here we serve
  # only the text path.  Served by the fastwan-video backend, which loads
  # the components via stock diffusers' WanPipeline and runs a hand-rolled
  # 3-step DMD denoising loop (we avoid the upstream `fastvideo` package
  # because it pins torch off our Blackwell-ready cu130 wheel — see
  # serving/fastwan-video/manifest.yaml).  Apache 2.0.
  fastwan22-ti2v-5b:
    source: FastVideo/FastWan2.2-TI2V-5B-FullAttn-Diffusers
    path: models/fastwan22-ti2v-5b/weights
    format: bf16
    backends: [fastwan-video]
    default_backend: fastwan-video
    downloaded: false
    # size_gb is an offline fallback — the launcher resolves live
    # per-file sizes from HuggingFace at download/poll time. Matches
    # actual 22.5 GB footprint (transformer 9.3 + text_encoder 10.6 +
    # vae 2.6 + metadata).
    size_gb: 23
    backend_env: {}
    backend_args: ""

  # --- multimodal MoE: Qwen3.6-35B-A3B, FP8, 35B total / 3B active, 65K ctx ---
  # Reads text, images, and video (frame-sampled).  Writes text only — pair
  # with Flux/Wan for generation.  Uses the official Qwen FP8 repo (half the
  # footprint of BF16 and Blackwell has FP8 tensor cores).  The
  # Qwen3_5MoeForConditionalGeneration arch is new (2026-04-15), so we build a
  # parallel image `os8-vllm:qwen36` off a fresh cu130-nightly and route only
  # this model to it via `vllm_image`.  Reasoning parser on by default (turn
  # off per-request with `chat_template_kwargs.enable_thinking: false`).
  # `qwen3_next_mtp` speculative + qwen3_coder tool parser both enabled.
  # --allowed-origins lets the `vision` client (localhost:9006) reach this
  # backend cross-origin.
  # See serving/vllm/Dockerfile.qwen36 for the image recipe.
  qwen3-6-35b-a3b:
    source: Qwen/Qwen3.6-35B-A3B-FP8
    path: models/qwen3-6-35b-a3b/weights
    format: fp8
    backends: [vllm]
    default_backend: vllm
    vllm_image: os8-vllm:qwen36
    downloaded: false
    size_gb: 36
    # Pairs with OpenCode — qwen3_coder tool-call parser is OpenCode's native
    # protocol. OS8 reads this via /api/triplet/roles and uses it as the
    # mandatory CLI for chat turns + builds when this model is the chat slot.
    recommended_client: opencode
    backend_env: {}
    # gpu-memory-utilization 0.40 — the Spark's 122 GB unified memory is shared
    # among qwen3.6 + Kontext (ComfyUI, ~18 GB at startup but spikes higher
    # during text-encoder + VAE init) + Kokoro (~2 GB) + OS overhead. At 0.60
    # vLLM grabs ~73 GB up front, MemAvailable drops to ~32 GB, and ComfyUI
    # OOMs at `cudaMemGetInfo` before it even loads weights. 0.40 reserves
    # ~49 GB — comfortable for the 36 GB FP8 weights with ~13 GB of KV — and
    # leaves enough breathing room for the other two residents.
    #
    # If you only run qwen3.6 (no triplet), bump back up to 0.80 for a much
    # larger KV cache. The launcher's admission accounting (effective_size_gb
    # derived from this fraction) will keep the budget honest either way.
    backend_args: "--max-model-len 65536 --gpu-memory-utilization 0.40 --tensor-parallel-size 1 --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder --allowed-origins '[\"*\"]' --speculative-config '{\"method\":\"qwen3_next_mtp\",\"num_speculative_tokens\":2}'"

  # --- chat (alt): AEON-7's NVFP4 quant of Gemma 4 26B-A4B, MoE, uncensored ---
  # Same Spark-tuned NVFP4 family as gemma-4-31B-it-nvfp4 but smaller and
  # faster (3.8B active params, ~16 GB on disk, 45+ tok/s single-stream on
  # GB10).  Text-only (no vision); supports tool-calling via `gemma4` parser.
  # Surfaced as the second option for `roles.chat` so users can swap from
  # Qwen3.6-35B without editing config.  See web/triplet.html chooser.
  # The model is uncensored — same liability profile as the upstream HF repo.
  aeon-7-gemma-4-26b:
    source: AEON-7/Gemma-4-26B-A4B-it-Uncensored-NVFP4
    path: models/aeon-7-gemma-4-26b/weights
    format: nvfp4
    backends: [vllm]
    default_backend: vllm
    # Same gemma4 tool-call parser family as Qwen3.6 — OpenCode handles it.
    recommended_client: opencode
    # Custom image — wraps os8-vllm:gemma4 with an entrypoint that copies
    # the bundled gemma4_patched.py over vLLM's stock loader before
    # serving (upstream vLLM hits a KeyError on the AEON-7 NVFP4 weight
    # layout otherwise). See serving/vllm/Dockerfile.gemma4-aeon.
    vllm_image: os8-vllm:gemma4-aeon
    downloaded: false
    size_gb: 16
    backend_env:
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    # gpu-memory-utilization 0.55 keeps headroom for Kontext (~18 GB) +
    # Kokoro (~2 GB w/ overhead) under the 100 GB triplet budget.  Tool
    # parser + chunked prefill + prefix caching come straight from the
    # AEON-7 model card's recommended Spark config.
    backend_args: "--quantization compressed-tensors --kv-cache-dtype fp8 --enable-chunked-prefill --enable-prefix-caching --max-model-len 65536 --gpu-memory-utilization 0.55 --enable-auto-tool-choice --tool-call-parser gemma4 --allowed-origins '[\"*\"]'"

  # --- chat (alt): NVIDIA Nemotron-Cascade 2 30B-A3B, MoE, math/coding/agentic ---
  # Released 2026-03-19. 30B MoE / 3B active. Post-trained with Cascade RL.
  # Gold-medal IMO/IOI/ICPC 2025. Designed for agentic tool use — pairs with
  # OpenHands as the OS8 client (mirrors how Qwen3.6 pairs with OpenCode).
  #
  # NVIDIA hasn't published an official FP8/NVFP4 quant yet, so we use the
  # community NVFP4 (~21 GB) at chankhavu/...; the recipe matches NVIDIA's
  # selective NVFP4 from the Nemotron 3 Nano Technical Report.
  #
  # vLLM ≥0.17.1 required for the nemotron_v3 reasoning parser. The new image
  # os8-vllm:cascade2 layers that on top of cu130-nightly. Tool-calling reuses
  # the qwen3_coder parser (same protocol as our existing Qwen3.6 path).
  # See serving/vllm/Dockerfile.cascade2 for the image recipe.
  nemotron-cascade-2:
    source: chankhavu/Nemotron-Cascade-2-30B-A3B-NVFP4
    path: models/nemotron-cascade-2/weights
    format: nvfp4
    backends: [vllm]
    default_backend: vllm
    vllm_image: os8-vllm:cascade2
    downloaded: false
    size_gb: 21
    # Pairs with OpenHands — Cascade-2's <tool_call>/<tool_response> protocol
    # is what OpenHands speaks via LiteLLM's openai/ provider. OpenCode would
    # silently produce broken tool calls with this model, so OS8 hard-pins
    # to OpenHands when this is the chat slot.
    recommended_client: openhands
    backend_env:
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    # No --quantization flag: this vLLM nightly cross-checks the CLI value
    # against config.json's `quantization_config.quant_method` (which is
    # `modelopt_fp4` for the chankhavu NVFP4 quant), and the only string that
    # passes the equality check is the literal `modelopt_fp4` — but the CLI
    # arg parser doesn't accept that as a valid choice. Omitting the flag
    # lets vLLM auto-detect from the model config and bypasses the assertion.
    # (gemma-4-31B-it-nvfp4's older recipe used `modelopt`, which still works
    # for that model because its config.json declares the legacy method name.)
    #
    # gpu-memory-utilization 0.40 mirrors qwen3.6 for triplet stacking math.
    # Cascade-2 supports 262K context but Spark KV ceiling makes 65K a safer
    # working window. nemotron_v3 reasoning parser handles <think> tags;
    # qwen3_coder tool-call parser handles <tool_call>/<tool_response>.
    # Sampling temperature=1.0 top_p=0.95 is the model card's recommendation
    # but is set per-request, not in backend_args.
    #
    # Deliberately omitted (vs. AEON-Gemma): --kv-cache-dtype fp8,
    # --enable-chunked-prefill, --enable-prefix-caching. Those are
    # AEON-recipe-specific and not validated for modelopt NVFP4 + nemotron_v3
    # parser combo. Add back individually once each is confirmed working.
    backend_args: "--max-model-len 65536 --gpu-memory-utilization 0.40 --reasoning-parser nemotron_v3 --enable-auto-tool-choice --tool-call-parser qwen3_coder --allowed-origins '[\"*\"]'"

  # --- text-to-speech: Kokoro v1, 82M params, 54 prebuilt voices, 8 languages ---
  # Lightweight TTS with high-quality prebuilt voices.  Served via Kokoro-FastAPI
  # (OpenAI-compatible /v1/audio/speech).  Models auto-download on first request.
  kokoro-v1:
    source: hexgrad/Kokoro-82M
    path: models/kokoro-v1/weights
    format: fp32
    backends: [kokoro]
    default_backend: kokoro
    downloaded: false
    size_gb: 0.3
    backend_env: {}
    backend_args: ""

  # --- text-to-speech: Fish Audio S2 Pro, Dual-AR 4.5B, 80+ languages ---
  # Zero-shot voice cloning from 10-30s reference audio.  Inline prosody
  # tags ([whisper], [excited], etc.) for fine-grained control.
  fish-s2-pro:
    source: fishaudio/s2-pro
    path: models/fish-s2-pro/weights
    format: bf16
    backends: [fish-speech]
    default_backend: fish-speech
    downloaded: false
    size_gb: 11
    backend_env: {}
    backend_args: ""

backends:
  nim:
    manifest: serving/nim/manifest.yaml
    port: 8000
  vllm:
    manifest: serving/vllm/manifest.yaml
    port: 8000
  llamacpp:
    manifest: serving/llamacpp/manifest.yaml
    port: 8080
  ollama:
    manifest: serving/ollama/manifest.yaml
    port: 11434
  comfyui:
    manifest: serving/comfyui/manifest.yaml
    port: 8188
  fish-speech:
    manifest: serving/fish-speech/manifest.yaml
    port: 8080
  wan-video:
    manifest: serving/wan-video/manifest.yaml
    port: 9003
  fastwan-video:
    manifest: serving/fastwan-video/manifest.yaml
    port: 9005
  kokoro:
    manifest: serving/kokoro/manifest.yaml
    port: 8880

# Phase-2 resource accounting. Admission checks sum(model.size_gb +
# kv_margin_gb) across running instances; over-budget ensures evict LRU
# non-resident siblings. Defaults are conservative for DGX Spark
# (128 GB unified memory).
resources:
  memory_budget_gb: 100
  kv_margin_gb: 10
  auto_start_resident: false  # user opts in via the dashboard's landing chooser (POST /api/triplet/start)
  auto_start_parallel: false  # serial by default — cold NVMe reads stampede at parallel start

# Named roles referenced by the `resident:` list. The OS8 v2 plan uses
# a three-role triplet: qwen3-6-35b-a3b for chat (covers all text tasks
# + vision via its multimodal head), flux1-kontext-dev for image (needs
# a reference image, see LOCAL_MODELS_PLAN.md v2), kokoro-v1 for voice.
# Swap the model here for a different GPU (e.g. chat → gemma-4-E2B-it
# on 24 GB cards) without touching the `resident:` list.
#
# A role may declare multiple `options:` (chat does, below) — the launcher
# dashboard renders a chooser, persists the user's selection in
# ~/.config/os8-launcher/settings.yaml, and resolves at start time via
# src/config.py::resolve_role.  Single-mapping roles keep the legacy
# `{model, backend}` shape and parse identically.
roles:
  chat:
    options:
      - { model: qwen3-6-35b-a3b,    backend: vllm, label: "Qwen3.6-35B (vision, default)" }
      - { model: aeon-7-gemma-4-26b, backend: vllm, label: "AEON-7 Gemma-4-26B (uncensored, fast, text-only)" }
      - { model: nemotron-cascade-2, backend: vllm, label: "Nemotron-Cascade 2 (math/coding, agentic)" }
    default: qwen3-6-35b-a3b
  image-gen: { model: flux1-kontext-dev, backend: comfyui }
  tts:       { model: kokoro-v1,         backend: kokoro }

# Auto-started on launcher boot and never picked as LRU eviction victims.
# Triplet size: 36 GB (qwen3.6) + 18 GB (kontext) + 0.3 GB (kokoro)
# = ~54 GB, plus KV margins ≈ 70 GB — fits comfortably under the 100 GB
# budget on a 128 GB DGX Spark.
resident:
  - chat
  - image-gen
  - tts

clients:
  aider:
    manifest: clients/aider/manifest.yaml
  opencode:
    manifest: clients/opencode/manifest.yaml
  openhands:
    manifest: clients/openhands/manifest.yaml
  open-webui:
    manifest: clients/open-webui/manifest.yaml
    port: 3000
  image-gen:
    manifest: clients/image-gen/manifest.yaml
    port: 9001
  video-gen:
    manifest: clients/video-gen/manifest.yaml
    port: 9004
  tts:
    manifest: clients/tts/manifest.yaml
    port: 9002
  vision:
    manifest: clients/vision/manifest.yaml
    port: 9006
  os8:
    type: bridge
    port: 8000
