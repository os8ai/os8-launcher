name: nim
install_type: container
# NIM images are model-specific. The actual image comes from the model's
# nim_image field in config.yaml at runtime (e.g., nvcr.io/nim/nvidia/...).
image: "{nim_image}"
port: 8000
run: "docker run --gpus all -p {port}:8000 -v {model_path}:/opt/nim/.cache -e NGC_API_KEY={ngc_api_key} {nim_image}"
update: "docker pull {nim_image}"

# NIM cold-start can take 30-60+ min while TensorRT-LLM engines download.
health_timeout: 7200

# Required credentials — injected as template variables when present,
# checked for presence at start time.
credentials:
  - ngc_api_key

# How model weights/images are populated for this backend.
download:
  type: image-pull
  image_field: nim_image
