name: vllm
install_type: container
image: os8-vllm:gemma4
port: 8000
run: "docker run --gpus all --ipc=host -p {port}:8000 -v {model_path}:/model {backend_env_flags} {image} --model /model --served-model-name {model_name} --trust-remote-code {backend_args}"
update: "docker pull vllm/vllm-openai:cu130-nightly"
