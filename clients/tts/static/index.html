<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>os8 tts</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  width: 100%;
  padding: 0.75rem 1.5rem;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: baseline;
  gap: 0.75rem;
}
header h1 { font-size: 1.1rem; color: #e94560; font-weight: 600; }
header .subtitle { font-size: 0.8rem; color: #888; }
.container {
  width: 100%;
  max-width: 800px;
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  flex: 1;
}
.prompt-row {
  display: flex;
  gap: 0.5rem;
}
#text {
  flex: 1;
  padding: 0.6rem 0.75rem;
  background: #16213e;
  border: 1px solid #2a2a4a;
  color: #e0e0e0;
  border-radius: 6px;
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  min-height: 80px;
  resize: vertical;
}
#text:focus { border-color: #0f3460; }
#text::placeholder { color: #555; }
#speak {
  padding: 0.6rem 1.5rem;
  background: #0f3460;
  color: #e0e0e0;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  white-space: nowrap;
  align-self: flex-end;
}
#speak:hover { background: #1a4a8a; }
#speak:disabled { opacity: 0.4; cursor: not-allowed; }
.settings-row {
  display: flex;
  gap: 1rem;
  font-size: 0.8rem;
  color: #888;
  flex-wrap: wrap;
}
.settings-row label { display: flex; align-items: center; gap: 0.3rem; }
.settings-row input, .settings-row select {
  background: #16213e;
  border: 1px solid #2a2a4a;
  color: #e0e0e0;
  border-radius: 4px;
  padding: 0.2rem 0.4rem;
  font-size: 0.8rem;
}
.settings-row input[type="number"] { width: 55px; }
.settings-row input[type="range"] { width: 80px; }
.settings-row select { width: auto; }
.tags-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.tag-btn {
  padding: 0.25rem 0.5rem;
  background: #16213e;
  border: 1px solid #2a2a4a;
  color: #999;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: inherit;
}
.tag-btn:hover { border-color: #0f3460; color: #e0e0e0; }
#status {
  font-size: 0.8rem;
  color: #888;
  min-height: 1.2em;
}
#status.error { color: #e94560; }
#status.generating { color: #f39c12; }
.ref-section {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.ref-section summary {
  font-size: 0.85rem;
  color: #888;
  cursor: pointer;
  user-select: none;
}
.ref-section summary:hover { color: #e0e0e0; }
.ref-inner {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  padding: 0.5rem;
  background: #16213e;
  border-radius: 6px;
  border: 1px solid #2a2a4a;
}
.ref-inner label { font-size: 0.8rem; color: #888; }
.ref-inner input[type="file"] { font-size: 0.8rem; color: #888; }
.ref-inner textarea {
  padding: 0.4rem 0.6rem;
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  color: #e0e0e0;
  border-radius: 4px;
  font-size: 0.8rem;
  font-family: inherit;
  resize: vertical;
  min-height: 40px;
  outline: none;
}
.voice-section {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  font-size: 0.8rem;
  color: #888;
}
.voice-filters {
  display: flex;
  gap: 0.75rem;
  align-items: center;
  flex-wrap: wrap;
}
.voice-filters select {
  background: #16213e;
  border: 1px solid #2a2a4a;
  color: #e0e0e0;
  border-radius: 4px;
  padding: 0.3rem 0.5rem;
  font-size: 0.8rem;
}
#voice-select {
  background: #16213e;
  border: 1px solid #2a2a4a;
  color: #e0e0e0;
  border-radius: 4px;
  padding: 0.3rem 0.5rem;
  font-size: 0.8rem;
  min-width: 220px;
}
.audio-area {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  align-items: center;
}
.audio-area audio {
  width: 100%;
  max-width: 600px;
}
.history {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  max-height: 200px;
  overflow-y: auto;
}
.history-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.5rem;
  background: #16213e;
  border-radius: 4px;
  font-size: 0.8rem;
}
.history-item .text-preview {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #888;
}
.history-item button {
  background: none;
  border: none;
  color: #888;
  cursor: pointer;
  font-size: 0.8rem;
  padding: 0.15rem 0.3rem;
}
.history-item button:hover { color: #e0e0e0; }
.history-item .delete-btn:hover { color: #e94560; }
.hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>os8 tts</h1>
  <span class="subtitle" id="subtitle">detecting backend...</span>
</header>
<div class="container">
  <div class="prompt-row">
    <textarea id="text" placeholder="Enter text to speak..." autofocus></textarea>
  </div>

  <!-- Fish Speech: prosody tags -->
  <div class="tags-row hidden" id="fish-tags">
    <button class="tag-btn" data-tag="[laughs]">[laughs]</button>
    <button class="tag-btn" data-tag="[whisper]">[whisper]</button>
    <button class="tag-btn" data-tag="[excited]">[excited]</button>
    <button class="tag-btn" data-tag="[sad]">[sad]</button>
    <button class="tag-btn" data-tag="[angry]">[angry]</button>
    <button class="tag-btn" data-tag="[giggles]">[giggles]</button>
    <button class="tag-btn" data-tag="[sighs]">[sighs]</button>
    <button class="tag-btn" data-tag="[pause]">...</button>
  </div>

  <!-- Kokoro: voice picker with filters -->
  <div class="voice-section hidden" id="kokoro-voice">
    <div class="voice-filters">
      <label>Language
        <select id="voice-lang">
          <option value="">All</option>
          <option value="a">American English</option>
          <option value="b">British English</option>
          <option value="e">Spanish</option>
          <option value="f">French</option>
          <option value="h">Hindi</option>
          <option value="i">Italian</option>
          <option value="j">Japanese</option>
          <option value="p">Portuguese</option>
          <option value="z">Chinese</option>
        </select>
      </label>
      <label>Gender
        <select id="voice-gender">
          <option value="">All</option>
          <option value="f">Female</option>
          <option value="m">Male</option>
        </select>
      </label>
      <label>Voice
        <select id="voice-select"><option value="">loading voices...</option></select>
      </label>
    </div>
  </div>

  <div class="settings-row">
    <label>Speed <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0"><span id="speed-val">1.0</span></label>
    <!-- Fish Speech only -->
    <label id="lbl-temp" class="hidden">Temp <input type="number" id="temperature" value="0.7" min="0.0" max="1.5" step="0.1"></label>
    <label>Format
      <select id="format">
        <option value="wav">WAV</option>
        <option value="mp3">MP3</option>
        <option value="opus">Opus</option>
      </select>
    </label>
    <!-- Fish Speech only -->
    <label id="lbl-latency" class="hidden">Latency
      <select id="latency">
        <option value="normal">Normal</option>
        <option value="balanced">Balanced (higher quality)</option>
      </select>
    </label>
  </div>

  <!-- Fish Speech: voice cloning -->
  <details class="ref-section hidden" id="fish-ref">
    <summary>Voice cloning (optional)</summary>
    <div class="ref-inner">
      <label>Reference audio (10-30s clip)</label>
      <input type="file" id="ref-audio" accept="audio/*">
      <label>Reference text (what the audio says)</label>
      <textarea id="ref-text" placeholder="Transcription of the reference audio..."></textarea>
    </div>
  </details>

  <button id="speak">Speak</button>
  <div id="status"></div>
  <div class="audio-area" id="audio-area">
    <span class="placeholder" style="color:#444; font-size:0.9rem; font-style:italic;">Generated audio will appear here</span>
  </div>
  <div class="history" id="history"></div>
</div>
<script>
const DASHBOARD = `http://${location.hostname}:9000`;
const statusEl = document.getElementById('status');
const audioArea = document.getElementById('audio-area');
const historyEl = document.getElementById('history');
const btn = document.getElementById('speak');
const textInput = document.getElementById('text');
const speedSlider = document.getElementById('speed');
const speedVal = document.getElementById('speed-val');
const subtitleEl = document.getElementById('subtitle');

let backendType = null;  // 'fish-speech' or 'kokoro'
let API = null;          // base URL for the TTS backend
let allVoices = [];      // raw voice name list from Kokoro

const LANG_MAP = {
  a: 'American English', b: 'British English', e: 'Spanish',
  f: 'French', h: 'Hindi', i: 'Italian',
  j: 'Japanese', p: 'Portuguese', z: 'Chinese',
};
const GENDER_MAP = { f: 'Female', m: 'Male' };

speedSlider.addEventListener('input', () => { speedVal.textContent = speedSlider.value; });

// Insert prosody tags at cursor (Fish Speech only)
document.querySelectorAll('.tag-btn').forEach(b => {
  b.addEventListener('click', () => {
    const tag = b.dataset.tag;
    const start = textInput.selectionStart;
    const end = textInput.selectionEnd;
    const val = textInput.value;
    textInput.value = val.slice(0, start) + tag + val.slice(end);
    textInput.selectionStart = textInput.selectionEnd = start + tag.length;
    textInput.focus();
  });
});

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className = cls || '';
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// --- Backend detection via launcher API ---

async function detectBackend() {
  try {
    const res = await fetch(`${DASHBOARD}/api/status`);
    if (!res.ok) throw new Error('dashboard unreachable');
    const data = await res.json();
    if (!data.backend) throw new Error('no backend running');

    const name = data.backend.name;
    const port = data.backend.port;
    API = `http://${location.hostname}:${port}`;

    if (name === 'kokoro') {
      backendType = 'kokoro';
      subtitleEl.textContent = 'Kokoro';
      setupKokoroUI();
    } else if (name === 'fish-speech') {
      backendType = 'fish-speech';
      subtitleEl.textContent = 'Fish Audio S2 Pro';
      setupFishUI();
    } else {
      throw new Error(`unknown TTS backend: ${name}`);
    }
  } catch (e) {
    // Fallback: try probing known ports directly
    await probeBackends();
  }
}

async function probeBackends() {
  // Try Kokoro first (lightweight, fast health check)
  for (const [name, port, healthPath] of [
    ['kokoro', 8880, '/v1/audio/voices'],
    ['fish-speech', 8080, '/v1/health'],
  ]) {
    try {
      const url = `http://${location.hostname}:${port}`;
      const r = await fetch(`${url}${healthPath}`, { signal: AbortSignal.timeout(3000) });
      if (r.ok) {
        API = url;
        backendType = name;
        if (name === 'kokoro') {
          subtitleEl.textContent = 'Kokoro';
          setupKokoroUI();
        } else {
          subtitleEl.textContent = 'Fish Audio S2 Pro';
          setupFishUI();
        }
        return;
      }
    } catch { /* try next */ }
  }
  setStatus('No TTS backend detected. Start one with: ./launcher serve kokoro-v1 --client tts', 'error');
  subtitleEl.textContent = 'no backend';
}

// --- UI setup per backend ---

function setupFishUI() {
  show('fish-tags');
  show('fish-ref');
  show('lbl-temp');
  show('lbl-latency');
  hide('kokoro-voice');
  setStatus('Connected to Fish Speech');
}

async function setupKokoroUI() {
  hide('fish-tags');
  hide('fish-ref');
  hide('lbl-temp');
  hide('lbl-latency');
  show('kokoro-voice');
  setStatus('Connected to Kokoro');
  await loadVoices();
}

async function loadVoices() {
  try {
    const res = await fetch(`${API}/v1/audio/voices`);
    if (!res.ok) throw new Error(`status ${res.status}`);
    const data = await res.json();
    const voices = data.voices || data;
    const voiceList = Array.isArray(voices) ? voices : Object.keys(voices);
    allVoices = voiceList
      .map(v => typeof v === 'string' ? v : (v.name || v.id || String(v)))
      .filter(v => v.length >= 2)
      .sort();
  } catch (e) {
    allVoices = ['af_bella'];
    console.warn('Failed to load voices:', e);
  }

  // Wire up filter change events
  document.getElementById('voice-lang').addEventListener('change', filterVoices);
  document.getElementById('voice-gender').addEventListener('change', filterVoices);
  filterVoices();
}

function filterVoices() {
  const lang = document.getElementById('voice-lang').value;
  const gender = document.getElementById('voice-gender').value;
  const sel = document.getElementById('voice-select');
  const prev = sel.value;

  const filtered = allVoices.filter(v => {
    // Skip legacy v0 voices unless no current-gen voices match
    if (v.includes('_v0')) return false;
    if (lang && v[0] !== lang) return false;
    if (gender && v[1] !== gender) return false;
    return true;
  });

  sel.innerHTML = '';
  if (filtered.length === 0) {
    sel.innerHTML = '<option value="">no voices match</option>';
    return;
  }
  for (const name of filtered) {
    const opt = document.createElement('option');
    opt.value = name;
    // Show friendly label: "af_bella — American English, Female"
    const langLabel = LANG_MAP[name[0]] || name[0];
    const genderLabel = GENDER_MAP[name[1]] || name[1];
    const displayName = name.replace(/^[a-z]{2}_/, '');
    opt.textContent = `${displayName} — ${langLabel}, ${genderLabel}`;
    sel.appendChild(opt);
  }
  // Restore previous selection if still in list, otherwise keep first
  if (filtered.includes(prev)) sel.value = prev;
}

// --- Audio generation ---

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function showAudio(url) {
  audioArea.innerHTML = `<audio controls autoplay src="${url}"></audio>`;
}

function addToHistory(url, text) {
  const item = document.createElement('div');
  item.className = 'history-item';

  const preview = document.createElement('span');
  preview.className = 'text-preview';
  preview.textContent = text.slice(0, 80);

  const playBtn = document.createElement('button');
  playBtn.textContent = 'play';
  playBtn.onclick = () => showAudio(url);

  const dlBtn = document.createElement('button');
  dlBtn.textContent = 'save';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tts-output.' + document.getElementById('format').value;
    a.click();
  };

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.textContent = 'x';
  delBtn.onclick = () => {
    URL.revokeObjectURL(url);
    item.remove();
  };

  item.append(preview, playBtn, dlBtn, delBtn);
  historyEl.prepend(item);
}

async function speak() {
  const text = textInput.value.trim();
  if (!text || !backendType) return;

  btn.disabled = true;
  setStatus('Generating speech...', 'generating');

  try {
    let res;

    if (backendType === 'kokoro') {
      const body = {
        model: 'kokoro',
        input: text,
        voice: document.getElementById('voice-select').value || 'af_bella',
        speed: parseFloat(speedSlider.value) || 1.0,
        response_format: document.getElementById('format').value,
      };
      res = await fetch(`${API}/v1/audio/speech`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } else {
      // Fish Speech
      const body = {
        text: text,
        temperature: parseFloat(document.getElementById('temperature').value) || 0.7,
        top_p: 0.9,
        speed: parseFloat(speedSlider.value) || 1.0,
        format: document.getElementById('format').value,
        latency: document.getElementById('latency').value,
      };

      const refFile = document.getElementById('ref-audio').files[0];
      const refText = document.getElementById('ref-text').value.trim();
      if (refFile) {
        const audioBase64 = await fileToBase64(refFile);
        body.references = [{ audio: audioBase64, text: refText }];
      }

      res = await fetch(`${API}/v1/tts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`${res.status}: ${err}`);
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    showAudio(url);
    addToHistory(url, text);
    setStatus('Done!', '');
  } catch (e) {
    setStatus(`Error: ${e.message}`, 'error');
  }

  btn.disabled = false;
}

btn.addEventListener('click', speak);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey && !btn.disabled) speak();
});

// Detect and connect on load
detectBackend();
</script>
</body>
</html>
