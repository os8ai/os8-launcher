<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>os8-launcher · chat / image / voice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        main.triplet {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            gap: 3px;
            background: #0f3460;
            height: calc(100vh - 52px);
        }
        .triplet-header {
            background: #1a1a2e;
            padding: 1rem 1.5rem;
        }
        .triplet-logs {
            background: #1a1a2e;
            padding: 1rem 1.5rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .triplet-intro p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .role-rows {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .role-row {
            display: grid;
            grid-template-columns: 140px 1fr auto auto;
            gap: 1rem;
            align-items: center;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 0.75rem 1rem;
        }
        .role-row .role-name {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 0.95rem;
        }
        .role-row .role-model {
            font-family: monospace;
            font-size: 0.85rem;
            color: #aaa;
        }
        .role-row .role-size {
            font-size: 0.8rem;
            color: #888;
            font-family: monospace;
        }
        .role-row .role-state {
            font-size: 0.85rem;
            min-width: 90px;
            text-align: right;
        }
        .role-row select {
            background: #0d0d1a;
            color: #e0e0e0;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 0.35rem 0.5rem;
            font-size: 0.85rem;
            font-family: inherit;
            width: 100%;
        }
        .role-pending {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-top: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: #2a2010;
            border: 1px solid #5a4720;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #f3c977;
        }
        .role-pending button {
            background: #f39c12;
            color: #1a1a2e;
            border: none;
            border-radius: 4px;
            padding: 0.35rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }
        .role-pending button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .state-idle { color: #888; }
        .state-starting { color: #f39c12; font-weight: 600; }
        .state-ready { color: #4ecca3; font-weight: 600; }
        .state-failed { color: #e94560; font-weight: 600; }
        .triplet-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        .triplet-url {
            font-size: 0.8rem;
            color: #888;
            font-family: monospace;
        }
        .triplet-url a { color: #5e7ce2; }
        #triplet-log-pane {
            background: #0d0d1a;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 0.75rem;
            font-size: 0.75rem;
            line-height: 1.5;
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #aaa;
            user-select: text;
        }
        /* Leftover dialog — shown when /api/triplet/start returns 409 */
        .leftover-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 20, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .leftover-modal {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 1.5rem;
            min-width: 560px;
            max-width: 80vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }
        .leftover-modal h3 {
            margin: 0 0 0.5rem 0;
            color: #f3c977;
            font-size: 1rem;
        }
        .leftover-modal .leftover-intro {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .leftover-group { margin-bottom: 1rem; }
        .leftover-group h4 {
            margin: 0 0 0.5rem 0;
            color: #ddd;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .leftover-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.75rem;
            align-items: center;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }
        .leftover-item.foreign { border-color: #5a2020; background: #2a1010; }
        .leftover-item .leftover-text {
            color: #ddd;
            font-family: monospace;
            font-size: 0.78rem;
            word-break: break-word;
        }
        .leftover-item .leftover-tag {
            display: inline-block;
            background: #e94560;
            color: #fff;
            font-size: 0.65rem;
            padding: 0.05rem 0.4rem;
            border-radius: 3px;
            margin-left: 0.4rem;
            font-family: inherit;
        }
        .leftover-item .leftover-status {
            font-size: 0.75rem;
            color: #888;
            font-family: monospace;
            margin-top: 0.3rem;
        }
        .leftover-item .leftover-status.ok { color: #4ecca3; }
        .leftover-item .leftover-status.fail { color: #e94560; }
        .leftover-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: flex-end;
        }
        .leftover-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-stop-one {
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 3px;
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-stop-one:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="color:inherit;text-decoration:none">os8-launcher</a></h1>
        <span class="subtitle">chat · image · voice</span>
        <a href="/" class="btn-settings" style="text-decoration:none;display:inline-flex;align-items:center">← Back</a>
        <button class="btn-settings" onclick="window.location='/launch.html'" title="Individual models">Individual models</button>
        <button class="btn-settings" onclick="restartDashboard()" title="Restart this dashboard server">Restart</button>
        <button class="btn-settings" onclick="stopDashboard()" title="Stop this dashboard server">Stop server</button>
    </header>

    <main class="triplet">
        <div class="triplet-header">
            <div class="triplet-intro">
                <p>The three resident models OS8 expects. Start brings them all up in sequence; Stop tears them down.</p>
            </div>
            <div class="role-rows" id="role-rows">Loading…</div>
            <div class="triplet-actions">
                <button id="btn-start" class="btn btn-primary" onclick="startTriplet()">Start triplet</button>
                <button id="btn-restart" class="btn btn-primary" onclick="restartTriplet()" disabled>Restart triplet</button>
                <button id="btn-stop" class="btn btn-danger" onclick="stopTriplet()" disabled>Stop triplet</button>
            </div>
        </div>
        <div class="triplet-logs">
            <h2 style="font-size:0.9rem;text-transform:uppercase;letter-spacing:0.05em;color:#888;margin-bottom:0.5rem;padding-bottom:0.5rem;border-bottom:1px solid #2a2a4a">Startup log</h2>
            <pre id="triplet-log-pane"></pre>
        </div>
    </main>

    <script>const API = '/api';</script>
    <script src="dashboard-actions.js"></script>
    <script>
        const POLL_INTERVAL = 3000;

        let cfg = null;
        let startRequested = sessionStorage.getItem('triplet-start-requested') === '1';
        // True between the click on Restart triplet and the moment the
        // subsequent Start completes. Disables every action button so the
        // user can't double-fire mid-sequence.
        let restartInFlight = false;
        let statusData = { backends: [] };
        // Per-role chooser state from /api/triplet/roles. Shape per role:
        //   { options: [...], default, selected, running_model, needs_apply, ... }
        let rolesData = {};
        // Roles where the user has clicked Apply but the new model isn't healthy yet.
        // Lets us disable the Apply button + dropdown for the duration.
        const applying = new Set();

        async function loadConfig() {
            try {
                cfg = await (await fetch(API + '/config')).json();
            } catch (e) { /* keep cfg null; render will show loading */ }
        }

        function roleState(role) {
            // Derive one of: idle | starting | ready | failed.
            // `failed` is only set by an explicit failure path in /api/logs;
            // we don't try to guess it from timing here.
            if (!cfg) return 'idle';
            const rc = cfg.roles[role];
            if (!rc) return 'idle';
            // Match resident instances belonging to any option of this role —
            // the multi-option chooser means a role's running model can be the
            // user's selection rather than the config default.
            const candidates = new Set(rc.options ? rc.options.map(o => o.model) : [rc.model]);
            const inst = (statusData.backends || []).find(
                b => b.resident && candidates.has(b.model),
            );
            if (inst) {
                return inst.health === 'healthy' ? 'ready' : 'starting';
            }
            return startRequested ? 'starting' : 'idle';
        }

        function escapeAttr(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
            }[c]));
        }

        function renderRoles() {
            const container = document.getElementById('role-rows');
            if (!cfg) return;
            const roles = cfg.resident || [];
            if (!roles.length) {
                container.innerHTML = '<div class="nothing-running">No resident roles configured in config.yaml.</div>';
                return;
            }
            const rows = [];
            for (const role of roles) {
                const rc = cfg.roles[role];
                if (!rc) {
                    rows.push(`<div class="role-row"><span class="role-name">${role}</span><span class="role-model muted">(unknown role)</span><span></span><span></span></div>`);
                    continue;
                }
                // The chat role is multi-option (rolesData[role].options.length > 1);
                // image-gen + tts are single-option and just render their one model name.
                const rd = rolesData[role];
                const selectedModel = rd?.selected || rc.model;
                const runningModel = rd?.running_model || null;
                const inst = (statusData.backends || []).find(
                    b => b.model === runningModel && b.resident,
                );
                const state = roleState(role);
                const stateLabel = {
                    idle: 'not running',
                    starting: 'starting…',
                    ready: 'ready ✓',
                    failed: 'failed ✗',
                }[state];
                const urlLine = (state === 'ready' && inst)
                    ? `<span class="triplet-url"><a href="http://localhost:${inst.port}" target="_blank">:${inst.port}</a></span>`
                    : `<span></span>`;

                // Center column: a <select> when there's a real choice, otherwise plain text.
                let centerCol;
                if (rd && rd.options && rd.options.length > 1) {
                    const opts = rd.options.map(o => {
                        const sel = o.model === selectedModel ? ' selected' : '';
                        const label = o.label || o.model;
                        return `<option value="${escapeAttr(o.model)}"${sel}>${escapeAttr(label)}</option>`;
                    }).join('');
                    const isApplying = applying.has(role);
                    centerCol = `<select data-role="${escapeAttr(role)}" onchange="onRoleChange(this)" ${isApplying ? 'disabled' : ''}>${opts}</select>`;
                } else {
                    const model = (cfg.models || {})[selectedModel] || {};
                    const sizeText = model.size_gb ? `<span class="role-size">${model.size_gb} GB</span>` : '';
                    centerCol = `<span class="role-model">${selectedModel} ${sizeText}</span>`;
                }

                rows.push(`
                    <div class="role-row">
                        <span class="role-name">${role}</span>
                        ${centerCol}
                        ${urlLine}
                        <span class="role-state state-${state}">${stateLabel}</span>
                        ${renderPendingBanner(role, rd)}
                    </div>
                `);
            }
            container.innerHTML = rows.join('');
        }

        function renderPendingBanner(role, rd) {
            if (!rd || !rd.needs_apply) return '';
            const isApplying = applying.has(role);
            const selectedLabel = (rd.options.find(o => o.model === rd.selected)?.label) || rd.selected;
            const runningLabel = (rd.options.find(o => o.model === rd.running_model)?.label) || rd.running_model;
            return `
                <div class="role-pending">
                    <span>Pending: <strong>${escapeAttr(selectedLabel)}</strong> — currently serving <strong>${escapeAttr(runningLabel)}</strong>.</span>
                    <button onclick="applyRole('${escapeAttr(role)}')" ${isApplying ? 'disabled' : ''}>${isApplying ? 'Applying…' : 'Stop & Apply'}</button>
                </div>
            `;
        }

        async function onRoleChange(sel) {
            const role = sel.dataset.role;
            const model = sel.value;
            try {
                const res = await fetch(API + '/triplet/role', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, model }),
                });
                if (!res.ok) throw new Error('save failed: ' + res.status);
            } catch (e) {
                alert('Could not save role selection: ' + (e.message || e));
            }
            // Refresh roles immediately so the pending banner appears without waiting for the next poll.
            await pollRoles();
            renderRoles();
        }

        async function applyRole(role) {
            const rd = rolesData[role];
            if (!rd) return;
            applying.add(role);
            renderRoles();
            try {
                const res = await fetch(API + '/triplet/role/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, model: rd.selected }),
                });
                if (!res.ok) throw new Error('apply failed: ' + res.status);
            } catch (e) {
                alert('Apply failed: ' + (e.message || e));
                applying.delete(role);
                renderRoles();
                return;
            }
            // Poll for completion: applying lifts when running_model matches selected
            // (or after a generous timeout — the launch path can take ~2 min cold).
            const start = Date.now();
            const ceiling = 5 * 60 * 1000;
            const tick = async () => {
                await pollRoles();
                await pollStatus();
                await pollLogs();
                const cur = rolesData[role];
                if (!cur || cur.running_model === cur.selected || Date.now() - start > ceiling) {
                    applying.delete(role);
                    renderRoles();
                    return;
                }
                setTimeout(tick, 2000);
            };
            tick();
        }

        async function pollRoles() {
            try {
                const res = await fetch(API + '/triplet/roles');
                if (res.ok) rolesData = await res.json();
            } catch (e) { /* ignore */ }
        }

        function updateButtons() {
            const anyRunning = (statusData.backends || []).some(b => b.resident);
            const anyHealthy = (statusData.backends || []).some(b => b.resident && b.health === 'healthy');
            const startBtn = document.getElementById('btn-start');
            const restartBtn = document.getElementById('btn-restart');
            const stopBtn = document.getElementById('btn-stop');
            // Start is available only when nothing resident is running AND we
            // aren't mid-start. Otherwise the user could double-fire and
            // second call would race ensure_backend's per-instance guard.
            startBtn.disabled = anyRunning || startRequested || restartInFlight;
            startBtn.textContent = startRequested && !anyRunning ? 'Starting…' : 'Start triplet';
            // Restart is available exactly when there's something to stop —
            // i.e. at least one resident role is up. Disabled mid-restart so
            // the user can't double-fire the stop+start sequence.
            if (restartBtn) {
                restartBtn.disabled = !anyRunning || restartInFlight;
                restartBtn.textContent = restartInFlight ? 'Restarting…' : 'Restart triplet';
            }
            stopBtn.disabled = (!anyRunning && !anyHealthy) || restartInFlight;
        }

        async function clearLogs() {
            // Wipe the shared log buffer so the next workflow's output is the
            // only thing the user sees in the pane. Best-effort — if the
            // route is missing on an older backend the start still proceeds.
            try {
                await fetch(API + '/logs/clear', { method: 'POST' });
            } catch (e) { /* ignore */ }
            const pane = document.getElementById('triplet-log-pane');
            if (pane) {
                pane.textContent = '';
                pane.dataset.raw = '';
            }
        }

        async function startTriplet(force) {
            startRequested = true;
            sessionStorage.setItem('triplet-start-requested', '1');
            updateButtons();
            renderRoles();
            // Fresh slate on every Start so the log pane shows only this run.
            // We skip clearing on the force-retry path so the user can still
            // see the leftover-survey context that triggered the dialog —
            // those lines are useful while debugging the failure.
            if (!force) await clearLogs();
            try {
                const res = await fetch(API + '/triplet/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force: !!force }),
                });
                if (res.status === 409) {
                    // Leftover state from a previous run — show a dialog with
                    // per-item Stop buttons. The user must explicitly clear
                    // each finding (or click Continue anyway) before we retry.
                    const body = await res.json();
                    const findings = (body.detail && body.detail.findings) || body.findings || [];
                    startRequested = false;
                    sessionStorage.removeItem('triplet-start-requested');
                    updateButtons();
                    renderRoles();
                    showLeftoverDialog(findings);
                    return;
                }
                if (!res.ok) {
                    const body = await res.text();
                    alert('Start failed: ' + body);
                    startRequested = false;
                    sessionStorage.removeItem('triplet-start-requested');
                }
            } catch (e) {
                alert('Start failed: ' + (e.message || e));
                startRequested = false;
                sessionStorage.removeItem('triplet-start-requested');
            }
            setTimeout(pollStatus, 500);
            setTimeout(pollLogs, 500);
        }

        function showLeftoverDialog(findings) {
            // Render the dialog. Each finding gets a Stop button; foreign-origin
            // items are visually flagged and require an extra confirm. The
            // user can also click "Continue anyway" (force=true) to proceed
            // without stopping anything — useful when the items are known
            // ours and harmless (e.g. an orphan container from a clean exit).
            const overlay = document.createElement('div');
            overlay.className = 'leftover-overlay';
            const modal = document.createElement('div');
            modal.className = 'leftover-modal';

            const groups = {
                stale_state: 'Stale launcher state',
                orphan_container: 'Orphan os8-* containers',
                port_conflict: 'Port conflicts',
                gpu_squatter: 'GPU memory holders',
            };
            const order = ['stale_state', 'orphan_container', 'port_conflict', 'gpu_squatter'];
            const byKind = {};
            findings.forEach(f => {
                if (!byKind[f.kind]) byKind[f.kind] = [];
                byKind[f.kind].push(f);
            });

            modal.innerHTML = '<h3>Leftover state from a previous run</h3>' +
                '<div class="leftover-intro">The launcher detected items that may interfere with the triplet startup. ' +
                'Stop each one before continuing, or click "Continue anyway" if you know they\'re safe.</div>';

            order.forEach(kind => {
                if (!byKind[kind]) return;
                const grp = document.createElement('div');
                grp.className = 'leftover-group';
                const h = document.createElement('h4');
                h.textContent = groups[kind];
                grp.appendChild(h);
                byKind[kind].forEach(f => {
                    const row = document.createElement('div');
                    row.className = 'leftover-item' + (f.origin === 'foreign' ? ' foreign' : '');
                    const text = document.createElement('div');
                    text.className = 'leftover-text';
                    text.textContent = f.summary;
                    if (f.origin === 'foreign') {
                        const tag = document.createElement('span');
                        tag.className = 'leftover-tag';
                        tag.textContent = 'FOREIGN';
                        text.appendChild(tag);
                    }
                    const status = document.createElement('div');
                    status.className = 'leftover-status';
                    text.appendChild(status);
                    row.appendChild(text);
                    const btn = document.createElement('button');
                    btn.className = 'btn-stop-one';
                    btn.textContent = f.origin === 'foreign' ? 'Force stop' : 'Stop';
                    btn.onclick = async () => {
                        if (f.origin === 'foreign') {
                            const ok = confirm(
                                'This is a foreign process not started by the launcher.\n\n' +
                                f.summary + '\n\n' +
                                'Stopping it may interrupt other work on this machine.\n' +
                                'Are you sure?'
                            );
                            if (!ok) return;
                        }
                        btn.disabled = true;
                        status.textContent = 'stopping…';
                        status.className = 'leftover-status';
                        try {
                            const r = await fetch(API + '/leftovers/stop', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: f.action }),
                            });
                            const body = await r.json().catch(() => ({}));
                            if (r.ok) {
                                status.textContent = body.detail || 'stopped';
                                status.className = 'leftover-status ok';
                                btn.textContent = 'Stopped';
                            } else {
                                status.textContent = (body.detail || 'failed');
                                status.className = 'leftover-status fail';
                                btn.disabled = false;
                            }
                        } catch (e) {
                            status.textContent = e.message || String(e);
                            status.className = 'leftover-status fail';
                            btn.disabled = false;
                        }
                    };
                    row.appendChild(btn);
                    grp.appendChild(row);
                });
                modal.appendChild(grp);
            });

            const actions = document.createElement('div');
            actions.className = 'leftover-actions';
            const cancel = document.createElement('button');
            cancel.className = 'btn';
            cancel.textContent = 'Cancel';
            cancel.onclick = () => overlay.remove();
            const retry = document.createElement('button');
            retry.className = 'btn btn-primary';
            retry.textContent = 'Retry start';
            retry.onclick = () => { overlay.remove(); startTriplet(false); };
            const force = document.createElement('button');
            force.className = 'btn btn-danger';
            force.textContent = 'Continue anyway';
            force.onclick = () => {
                if (!confirm('Skip the leftover check and start the triplet anyway?')) return;
                overlay.remove();
                startTriplet(true);
            };
            actions.appendChild(cancel);
            actions.appendChild(retry);
            actions.appendChild(force);
            modal.appendChild(actions);
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
        }

        async function stopTriplet() {
            startRequested = false;
            sessionStorage.removeItem('triplet-start-requested');
            updateButtons();
            try {
                await fetch(API + '/triplet', { method: 'DELETE' });
            } catch (e) {
                alert('Stop failed: ' + (e.message || e));
            }
            setTimeout(pollStatus, 500);
            setTimeout(pollLogs, 500);
        }

        async function _waitForTripletStopped(timeoutMs) {
            // Poll /api/status until no resident backend is reported, or the
            // timeout fires. Returns true on clean drain, false on timeout.
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
                try {
                    const s = await (await fetch(API + '/status', { cache: 'no-store' })).json();
                    const anyResident = (s.backends || []).some(b => b.resident);
                    if (!anyResident) return true;
                } catch (e) { /* keep polling */ }
                await new Promise(r => setTimeout(r, 500));
            }
            return false;
        }

        async function restartTriplet() {
            // Stop -> wait for drain -> clear logs -> start. We surface
            // failure at each step rather than swallowing them silently;
            // a stuck drain almost always means a backend is hung in stop.
            restartInFlight = true;
            updateButtons();
            try {
                await fetch(API + '/triplet', { method: 'DELETE' });
            } catch (e) {
                alert('Restart failed (stop): ' + (e.message || e));
                restartInFlight = false;
                updateButtons();
                return;
            }
            const drained = await _waitForTripletStopped(60000);
            if (!drained) {
                alert('Restart failed: triplet did not stop within 60s. Check the log pane and try Stop manually.');
                restartInFlight = false;
                updateButtons();
                return;
            }
            await clearLogs();
            restartInFlight = false;
            updateButtons();
            // startTriplet runs its own clearLogs() too (no-op on an empty
            // buffer) and respects the leftover-survey 409 path.
            await startTriplet(false);
        }

        async function pollStatus() {
            try {
                statusData = await (await fetch(API + '/status')).json();
                // Refresh chooser state alongside backend status so the pending
                // banner stays accurate without a separate timer.
                await pollRoles();
                // Clear the start-requested latch once every resident role is
                // healthy — keeps the Start button sensible if the user
                // navigates back here.
                if (startRequested && cfg) {
                    const roles = cfg.resident || [];
                    const allReady = roles.every(r => roleState(r) === 'ready');
                    if (allReady) {
                        startRequested = false;
                        sessionStorage.removeItem('triplet-start-requested');
                    }
                }
                renderRoles();
                updateButtons();
            } catch (e) { /* ignore */ }
        }

        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
            }[c]));
        }

        async function pollLogs() {
            try {
                const lines = await (await fetch(API + '/logs')).json();
                const pane = document.getElementById('triplet-log-pane');
                const next = lines.join('\n');
                if (pane.dataset.raw === next) return;
                const atBottom = pane.scrollTop + pane.clientHeight >= pane.scrollHeight - 20;
                pane.textContent = next;
                pane.dataset.raw = next;
                if (atBottom) pane.scrollTop = pane.scrollHeight;
            } catch (e) { /* ignore */ }
        }

        (async function init() {
            await loadConfig();
            await pollRoles();      // first paint includes the chooser
            renderRoles();
            await pollStatus();
            await pollLogs();
            setInterval(pollStatus, POLL_INTERVAL);
            setInterval(pollLogs, POLL_INTERVAL);
        })();
    </script>
</body>
</html>
